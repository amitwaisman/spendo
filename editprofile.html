<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="container">
        <h1>Edit Profile</h1>
        <hr>
        <div class="row">
            <div class="col-md-3 text-center">
                <img src="https://png.pngitem.com/pimgs/s/150-1503945_transparent-user-png-default-user-image-png-png.png" class="avatar img-circle" alt="avatar">
                <h6>Upload a photo</h6>
                <input type="file" class="form-control">
            </div>
            <div class="col-md-9 personal-info">
                <div id="alert-container"></div> 
                <h3>Personal info</h3>
                <form class="form-horizontal" role="form">
                    <div class="form-group">
                        <label class="col-md-3 control-label" for="username">Username:</label>
                        <div class="col-md-8">
                            <input class="form-control" id="username" type="text" value="janeuser">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-lg-3 control-label" for="email">Email:</label>
                        <div class="col-lg-8">
                            <input class="form-control" id="email" type="text" value="janesemail@gmail.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-md-3 control-label" for="password">Password:</label>
                        <div class="col-md-8">
                            <input class="form-control" id="password" type="password" value="11111122333">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-md-3 control-label" for="confirmPassword">Confirm password:</label>
                        <div class="col-md-8">
                            <input class="form-control" id="confirmPassword" type="password" value="11111122333">
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="col-md-8 col-md-offset-3">
                            <button id="saveBtn" class="btn btn-primary">Save Changes</button>
                            <input type="reset" class="btn btn-default" value="Cancel">
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <hr>
</body>
<script src="script.js"></script>
</html>
