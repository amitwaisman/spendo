<div class="container" id="container">
	<div class="form-container sign-up-container">
		<form action="#">

			<input type="text" placeholder="Name" id="signup-name" />
			<input type="email" placeholder="Email" id="signup-email" />
			<input type="password" placeholder="Password" id="signup-password" />
			<button class="btn  btn-danger border rounded-pill px-2 me-3">Sign Up</button>
		</form>
	</div>

		<form class="">

				<button class="ghost btn btn-outline-danger border rounded-pill px-2 me-3" id="signIn">Sign In</button>
