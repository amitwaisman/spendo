<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

    <link rel="stylesheet" href="style.css">
		<link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fs-4 sticky-top mb-4">
        <div class="container-fluid">
            <a class="navbar-brand text-danger fw-bold" href="#">
                <h3>Spendo</h3>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span> <!-- האיקון של ההמבורגר -->
            </button>

            <!-- התפריט עצמו -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../profile.html">Profile</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        <h1>Edit Profile</h1>
        <hr>
        <div class="row">
            <div class="col-md-3 text-center">
                <img src="https://png.pngitem.com/pimgs/s/150-1503945_transparent-user-png-default-user-image-png-png.png"
                    class="avatar img-circle" alt="avatar">
                <h6>Upload a photo</h6>
                <input type="file" class="form-control">
            </div>
            <div class="col-md-9 personal-info">
                <div id="alert-container"></div>
                <h3>Personal info</h3>
                <form class="form-horizontal" role="form">
                    <div class="form-group">
                        <label class="control-label" for="username">Username:</label>
                        <div class="col-md-8">
                            <input class="form-control" id="username" type="text" >
                        </div>
                    </div>
                    <div class="form-group">
                        <label class=" control-label" for="email">Email:</label>
                        <div class="col-lg-8">
                            <input class="form-control" id="email" type="text" >
                        </div>
                    </div>
                    <div class="form-group">
                        <label class=" control-label" for="password">Password:</label>
                        <div class="col-md-8">
                            <input class="form-control" id="password" type="password">
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="col-md-8 col-md-offset-3">
                            <button id="saveBtn" class="btn btn-danger rounded-pill">Save Changes</button>
                            <input type="reset" class="btn btn-default rounded-pill" value="Cancel">
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <hr>
</body>
<script src="script.js"></script>

</html>
